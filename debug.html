<!DOCTYPE html>
<html>
<head>
<style>body{background:#060a14;color:white;font-family:sans-serif;padding:20px;}</style>
</head>
<body>
<div id="out">Loading...</div>
<script type="module">
  const out = document.getElementById('out');
  out.innerHTML = 'Module script running...<br>';
  
  try {
    const { storage, AP3X_KEYS } = await import('/ap3x/core/storage.js');
    out.innerHTML += 'storage.js loaded OK<br>';
    
    const { getVehicles } = await import('/ap3x/core/vehicles.js');
    out.innerHTML += 'vehicles.js loaded OK<br>';
    out.innerHTML += 'Vehicles: ' + JSON.stringify(getVehicles().map(v=>v.name)) + '<br>';
    
    const { isSimulationRunning } = await import('/ap3x/engine/simulation-engine.js');
    out.innerHTML += 'simulation-engine.js loaded OK<br>';
    out.innerHTML += 'Running: ' + isSimulationRunning() + '<br>';
    
    out.innerHTML += '<br><strong style="color:lime">ALL IMPORTS OK ✓</strong>';
  } catch(e) {
    out.innerHTML += '<br><strong style="color:red">ERROR: ' + e.message + '</strong><br>';
    out.innerHTML += e.stack;
  }
</script>
</body>
</html>
